<!DOCTYPE html>
<html>

<head>
    <title>TrueSight AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        button {
            background: linear-gradient(45deg, #4f46e5, #22c55e);
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        #uploadSection,
        #historySection,
        #analyticsSection {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px;
        }
    </style>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            background: #0f172a;
            color: white;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #020617;
            height: 100vh;
            padding: 20px;
            border-right: 1px solid #1e293b;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: transparent;
            border: 1px solid #1e293b;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar button:hover {
            background: #1e293b;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            padding: 10px 20px;
            background: linear-gradient(45deg, #6366f1, #22c55e);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            font-size: 16px;
        }

        img {
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">🚀 TrueSight AI</div>

       <button onclick="showSection('homeSection')">Upload</button>
<button onclick="showSection('historySection')">History</button>
<button onclick="showSection('analyticsSection')">Analytics</button>
        <button onclick="payNow()">Upgrade 💎</button>
    </div>

    <!-- Main -->
    <!-- LOGIN -->
    <div id="loginSection">
        <h2>Login</h2>

        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>
        <button onclick="signup()">Signup</button>
    </div>

    <!-- HOME / UPLOAD -->
    <div id="homeSection" style="display:none;">
        <h2>Upload Image</h2>

        <input type="file" id="fileInput">
        <button onclick="uploadImage()">Analyze</button>

        <div id="result"></div>
    </div>

    <!-- HISTORY -->
    <div id="historySection" style="display:none;">
    <div id="historyContainer"></div>
</div>

    <!-- ANALYTICS -->
    <div id="analyticsSection" style="display:none;">
        <canvas id="chart"></canvas>
    </div>

    <br>
    <button onclick="logout()">Logout</button>
    </div>
    </div>

    </div>

    <script>
     window.onload = function () {
    const user = localStorage.getItem("username");

    if (user) {
        showSection("homeSection");
    } else {
        showSection("loginSection");
    }
};

    

        // Preview Image
        document.getElementById("fileInput").onchange = function () {
            let file = this.files[0];
            let reader = new FileReader();

            reader.onload = function (e) {
                document.getElementById("preview").src = e.target.result;
            }

            reader.readAsDataURL(file);
        }

        // Upload Image
        async function uploadImage() {
    let file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Select file first ❌");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("https://truesight-ai-6bv4.onrender.com/detect_image", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    document.getElementById("result").innerHTML = `
        <b>Prediction:</b> ${data.prediction} <br>
        <b>Confidence:</b> ${data.confidence}
    `;
}

        // Load History

        function loadHistory() {
            const email = localStorage.getItem("username");

            fetch(`https://truesight-ai-6bv4.onrender.com/history/${email}`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById("historyContainer");
                    container.innerHTML = "";

                    data.forEach(item => {
                        container.innerHTML += `
               <div style="margin-bottom:20px;">
<img src="https://truesight-ai-6bv4.onrender.com/uploads/${item.filename}">
    <p><b>${item.filename}</b></p>
    <p>${item.prediction}</p>
    <p>${item.confidence}</p>
</div>
            `;
                    });
                });
        }

        function showUpload() {
            location.reload();
        }

        async function loadStats() {

            let res = await fetch("https://truesight-ai-6bv4.onrender.com/stats");
            let data = await res.json();

            let html = `
    <div class="card">
        <h2>Analytics</h2>
        <p>Total: ${data.total}</p>
        <p>Real: ${data.real}</p>
        <p>Fake: ${data.fake}</p>
    </div>
    `;

            document.getElementById("content").innerHTML = html;
        }



   
        const API = "https://truesight-ai-6bv4.onrender.com";
function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch(`${API}/signup`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert("Signup success");

            // ✅ SAVE USER
            localStorage.setItem("username", email);

            // ✅ SWITCH PAGE
            showSection("homeSection");
        }
    })
    .catch(err => {
        console.error(err);
        alert("Signup failed");
    });
}
   
       async function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    let data = await res.json();

    if (data.error) {
        alert(data.error);
    } else {
        alert("Login success");

        localStorage.setItem("username", email);

        // 🚀 THIS IS THE FIX
        showSection("homeSection");
    }
}
    
   
        function showHome() {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("homeSection").style.display = "block";
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = function () {
            if (localStorage.getItem("loggedIn")) {
                showHome();
            }
        };

   
        function analyzeImage() {

            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a file");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);
            formData.append("username", localStorage.getItem("username"));

            fetch("https://truesight-ai-6bv4.onrender.com/detect_image", {
                method: "POST",
                body: formData
            })
                .then(res => res.json())
                .then(data => {
                    console.log(data);
                })
                .catch(err => {
                    console.error("Error:", err);
                });
        }

   
        function showSection(section) {
    console.log("Switching to:", section); // 🔍 debug

    document.getElementById("loginSection").style.display = "none";
    document.getElementById("homeSection").style.display = "none";
    document.getElementById("historySection").style.display = "none";
    document.getElementById("analyticsSection").style.display = "none";

    document.getElementById(section).style.display = "block";
}
   
        function loadAnalytics() {
            fetch("https://truesight-ai-6bv4.onrender.com/history")
                .then(res => res.json())
                .then(data => {

                    let real = 0;
                    let fake = 0;

                    data.forEach(item => {
                        if (item.prediction === "REAL") real++;
                        else fake++;
                    });

                    const ctx = document.getElementById("chart");

                    new Chart(ctx, {
                        type: "bar",
                        data: {
                            labels: ["REAL", "FAKE"],
                            datasets: [{
                                label: "Predictions",
                                data: [real, fake]
                            }]
                        }
                    });
                });
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }

        function payNow() {
            var options = {
                key: "YOUR_KEY",
                amount: 50000,
                currency: "INR",
                name: "TrueSight AI",
                description: "Premium Plan",
                handler: function () {
                    alert("Payment Successful 🎉");
                }
            };

            var rzp = new Razorpay(options);
            rzp.open();
        }

       
    </script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>


</body>

</html>
